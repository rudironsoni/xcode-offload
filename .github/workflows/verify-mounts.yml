name: Mount Verification

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Verification mode: user, system, or e2e"
        required: true
        default: user
        type: choice
        options:
          - user
          - system
          - e2e
      scratch_root:
        description: "Dedicated scratch root on a writable external volume"
        required: true
        type: string
      runtime:
        description: "Optional CoreSimulator runtime id for e2e recreate"
        required: false
        type: string
      device_type:
        description: "Optional CoreSimulator device type id for e2e recreate"
        required: false
        type: string
      keep_artifacts:
        description: "Keep verification artifacts on the runner"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    name: Mount Verification
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Build
        run: swift build

      - name: Verify mounts
        env:
          XCODE_OFFLOAD_VERIFY_KEEP_ARTIFACTS: ${{ inputs.keep_artifacts }}
        run: |
          args=(
            ".build/debug/xcode-offload"
            "mounts"
            "verify"
            "--scratch-root"
            "${{ inputs.scratch_root }}"
            "--mode"
            "${{ inputs.mode }}"
          )
          if [ -n "${{ inputs.runtime }}" ]; then
            args+=("--runtime" "${{ inputs.runtime }}")
          fi
          if [ -n "${{ inputs.device_type }}" ]; then
            args+=("--device-type" "${{ inputs.device_type }}")
          fi
          if [ "${{ inputs.keep_artifacts }}" = "true" ]; then
            args+=("--keep-artifacts")
          fi
          if [ "${{ inputs.mode }}" = "system" ]; then
            args+=("--allow-system")
          fi
          if [ "${{ inputs.mode }}" = "e2e" ]; then
            args+=("--allow-sim-delete")
          fi
          "${args[@]}"
