name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Generate version metadata
        run: make generate-version-source

      - name: Validate Makefile
        run: make check-makefile

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Guard against machine-specific defaults
        run: make check-no-machine-defaults

      - name: Validate docs
        run: make check-docs

      - name: Smoke version command
        run: make smoke-version

      - name: Smoke CLI behavior
        run: make smoke-cli

      - name: Smoke release artifact
        run: make check-release-artifact
