name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate version metadata
        run: scripts/generate-version-source.sh

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Guard against machine-specific defaults
        run: scripts/check-no-machine-defaults.sh

      - name: Smoke version command
        run: .build/debug/xcode-storage version
