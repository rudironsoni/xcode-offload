name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate SemVer tag
        id: semver
        uses: matt-usurp/validate-semver@v3
        with:
          version: ${{ github.ref }}

      - name: Build release artifact
        id: build
        run: |
          archive="$(XCODE_STORAGE_KEEP_GENERATED_VERSION=1 scripts/build-release.sh)"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$archive.sha256" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Guard against machine-specific defaults
        run: scripts/check-no-machine-defaults.sh

      - name: Generate release notes
        run: scripts/generate-changelog.sh --notes-only "$GITHUB_REF_NAME"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            "${{ steps.build.outputs.archive }}" \
            "${{ steps.build.outputs.checksum }}"
