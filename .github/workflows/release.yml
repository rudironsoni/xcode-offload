name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate SemVer tag
        id: semver
        uses: matt-usurp/validate-semver@v3.0.0
        with:
          version: ${{ inputs.tag || github.ref }}

      - name: Build release artifact
        id: build
        env:
          XCODE_STORAGE_RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          XCODE_STORAGE_KEEP_GENERATED_VERSION: "1"
        run: |
          archive="$(scripts/build-release.sh)"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$archive.sha256" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Guard against machine-specific defaults
        run: scripts/check-no-machine-defaults.sh

      - name: Verify checksum
        env:
          CHECKSUM: ${{ steps.build.outputs.checksum }}
        run: shasum -a 256 -c "$CHECKSUM"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.build.outputs.archive }}
            ${{ steps.build.outputs.checksum }}
          fail_on_unmatched_files: true
