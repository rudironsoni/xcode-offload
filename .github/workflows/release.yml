name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SemVer tag
        run: |
          if ! printf '%s\n' "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Release tags must be SemVer and start with v, for example v0.1.0" >&2
            exit 1
          fi

      - name: Build release artifact
        id: build
        run: |
          archive="$(scripts/build-release.sh)"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$archive.sha256" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Guard against machine-specific defaults
        run: scripts/check-no-machine-defaults.sh

      - name: Generate changelog
        run: scripts/generate-changelog.sh "$GITHUB_REF_NAME"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            "${{ steps.build.outputs.archive }}" \
            "${{ steps.build.outputs.checksum }}"
