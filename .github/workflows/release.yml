name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: macos-15
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate SemVer tag
        id: semver
        uses: matt-usurp/validate-semver@v3.0.0
        with:
          version: ${{ inputs.tag || github.ref }}

      - name: Build release artifact
        id: build
        env:
          XCODE_OFFLOAD_RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          XCODE_OFFLOAD_KEEP_GENERATED_VERSION: "1"
        run: |
          archive="$(make --no-print-directory build-release)"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$archive.sha256" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Guard against machine-specific defaults
        run: make check-no-machine-defaults

      - name: Verify checksum
        env:
          CHECKSUM: ${{ steps.build.outputs.checksum }}
        run: |
          cd "$(dirname "$CHECKSUM")"
          shasum -a 256 -c "$(basename "$CHECKSUM")"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.build.outputs.archive }}
            ${{ steps.build.outputs.checksum }}
          fail_on_unmatched_files: true

      - name: Bump Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: Homebrew/actions/bump-packages@main
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formulae: rudironsoni/tap/xcode-offload
          fork: false

      - name: Skip Homebrew tap bump
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap bump."
