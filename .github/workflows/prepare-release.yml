name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare and Publish Release
    runs-on: macos-15
    steps:
      - name: Checkout main
        uses: actions/checkout@v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Validate Makefile
        run: make check-makefile

      - name: Test
        run: swift test

      - name: Guard against machine-specific defaults
        run: make check-no-machine-defaults

      - name: Update changelog and tag release
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6.3.1
        with:
          github-token: ${{ github.token }}
          git-branch: main
          git-message: "docs: update changelog for {version}"
          git-user-name: github-actions[bot]
          git-user-email: 41898282+github-actions[bot]@users.noreply.github.com
          preset: conventionalcommits
          input-file: CHANGELOG.md
          output-file: CHANGELOG.md
          fallback-version: "0.1.0"
          skip-version-file: "true"
          skip-ci: "false"
          create-summary: "true"

      - name: Require release changes
        if: steps.changelog.outputs.skipped == 'true'
        run: |
          echo "No conventional commits found for a release." >&2
          exit 1

      - name: Build release artifact
        id: build
        env:
          XCODE_STORAGE_RELEASE_TAG: ${{ steps.changelog.outputs.tag }}
          XCODE_STORAGE_KEEP_GENERATED_VERSION: "1"
        run: |
          archive="$(make --no-print-directory build-release)"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$archive.sha256" >> "$GITHUB_OUTPUT"

      - name: Verify checksum
        env:
          CHECKSUM: ${{ steps.build.outputs.checksum }}
        run: |
          cd "$(dirname "$CHECKSUM")"
          shasum -a 256 -c "$(basename "$CHECKSUM")"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          files: |
            ${{ steps.build.outputs.archive }}
            ${{ steps.build.outputs.checksum }}
          fail_on_unmatched_files: true
